<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan 110: Introduction to Japanese Popular Culture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Raleway:wght@300;400;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ── Canvas background ───────────────────────────────────────── */
    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── UI overlay ─────────────────────────────────────────────── */
    .ui {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6%;
    }

    /* ── Left: title block ───────────────────────────────────────── */
    .title-block { flex: 1; }

    .main-title {
      font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 6.5vw, 5.5rem);
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1;
      font-style: italic;
      text-shadow:
        0 0 40px rgba(130, 200, 255, 0.65),
        0 0 80px rgba(80, 150, 230, 0.30),
        2px 3px 8px rgba(0, 0, 0, 0.85);
    }

    .divider {
      width: clamp(140px, 38%, 340px);
      height: 1.5px;
      margin: 10px 0 12px;
      background: linear-gradient(
        to right,
        rgba(170, 220, 255, 0.90) 0%,
        rgba(170, 220, 255, 0.35) 60%,
        transparent 100%
      );
    }

    .sub-title {
      font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.85vw, 1.15rem);
      color: #9ecfe8;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(120, 190, 255, 0.55);
    }

    /* ── Right: menu ─────────────────────────────────────────────── */
    .menu {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
      align-self: flex-end;
      padding-bottom: 6%;
    }

    /* Active / highlighted item — mimics the bright "NEW GAME" entry */
    .start-btn {
      display: block;
      font-family: 'Raleway', Arial, sans-serif;
      font-weight: 600;
      font-size: clamp(0.9rem, 1.9vw, 1.35rem);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #ffffff;
      text-decoration: none;
      padding: 6px 18px 6px 14px;
      border-right: 3px solid rgba(160, 225, 255, 0.95);
      background: linear-gradient(to left, rgba(100, 185, 255, 0.14), transparent);
      text-shadow:
        0 0 22px rgba(160, 225, 255, 0.95),
        0 0 45px rgba(100, 185, 255, 0.45);
      transition: text-shadow 0.2s ease, background 0.2s ease;
    }

    .start-btn:hover, .start-btn:focus {
      text-shadow:
        0 0 30px rgba(200, 240, 255, 1),
        0 0 60px rgba(150, 210, 255, 0.70);
      background: linear-gradient(to left, rgba(100, 185, 255, 0.26), transparent);
      outline: none;
    }

    /* ── Bottom-left professor line ──────────────────────────────── */
    .professor {
      position: absolute;
      bottom: 22px;
      left: 6%;
      font-family: 'Raleway', Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(0.55rem, 1.05vw, 0.78rem);
      color: rgba(190, 215, 240, 0.60);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 50%,
        rgba(0, 0, 0, 0.65) 100%
      );
    }

    /* ── Music toggle ────────────────────────────────────────────── */
    #music-btn {
      position: fixed;
      bottom: 22px;
      right: 6%;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s;
      z-index: 10;
      filter: drop-shadow(0 0 6px rgba(100, 185, 255, 0.60));
    }
    #music-btn:hover { opacity: 1; }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="vignette"></div>

  <div class="ui">
    <div class="title-block">
      <div class="main-title">Japan 110</div>
      <div class="divider"></div>
      <div class="sub-title">Introduction to Japanese Popular Culture</div>
    </div>
    <div class="menu">
      <!-- Replace the href value below with your Canvas course URL -->
      <a href="https://prof-quinn-japan110-popculture.replit.app/tutorial" class="start-btn">Start</a>
    </div>
  </div>

  <div class="professor">Professor Aragorn Quinn</div>
  <button id="music-btn" title="Toggle music">🔊</button>

  <script>
    /* ─────────────────────────────────────────────────────────────
       Canvas: atmospheric city background + flying bird particles
       Inspired by the Crisis Core: Final Fantasy VII title screen
    ───────────────────────────────────────────────────────────── */
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');

    /* ── Resize ── */
    function resize() {
      canvas.width  = window.innerWidth  || document.documentElement.clientWidth  || 800;
      canvas.height = window.innerHeight || document.documentElement.clientHeight || 500;
      buildCity();
    }

    /* ── City silhouette ── */
    let buildings = [];

    function buildCity() {
      buildings = [];
      const W = canvas.width, H = canvas.height;
      let x = 0;
      while (x < W + 80) {
        const bw = 18 + Math.random() * 70;
        const bh = 55 + Math.random() * (H * 0.48);
        const by = H - bh;
        const wins = [];
        const cols = Math.max(1, Math.floor((bw - 6) / 9));
        const rows = Math.max(1, Math.floor((bh - 8) / 12));
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (Math.random() > 0.42) {
              wins.push({
                wx: x + 4 + c * 9,
                wy: by + 7 + r * 12,
                lit: Math.random() > 0.28
              });
            }
          }
        }
        buildings.push({ x, y: by, w: bw, h: bh, wins });
        x += bw + 1 + Math.random() * 12;
      }
    }

    /* ── Particles (birds + dust specks) ── */
    let particles = [];

    function initParticles() {
      particles = [];
      const W = canvas.width, H = canvas.height;
      for (let i = 0; i < 65; i++) {
        const bird = Math.random() > 0.40;
        particles.push({
          x:  Math.random() * W,
          y:  Math.random() * H * 0.72,
          sx: 0.35 + Math.random() * 1.3,
          sy: (Math.random() - 0.55) * 0.55,
          sz: 2.5 + Math.random() * 4.5,
          op: 0.13 + Math.random() * 0.42,
          bird
        });
      }
    }

    /* ── Draw one frame ── */
    function draw() {
      const W = canvas.width, H = canvas.height;

      /* Sky */
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0.00, '#060a18');
      sky.addColorStop(0.40, '#0c1828');
      sky.addColorStop(0.72, '#16263a');
      sky.addColorStop(1.00, '#080e18');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      /* Central atmospheric glow (searchlight haze) */
      const haze = ctx.createRadialGradient(W * 0.38, H * 0.28, 0, W * 0.38, H * 0.28, W * 0.52);
      haze.addColorStop(0,   'rgba(90,160,230,0.16)');
      haze.addColorStop(0.5, 'rgba(60,120,200,0.07)');
      haze.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = haze;
      ctx.fillRect(0, 0, W, H);

      /* Secondary warm glow upper-right */
      const haze2 = ctx.createRadialGradient(W * 0.72, H * 0.18, 0, W * 0.72, H * 0.18, W * 0.35);
      haze2.addColorStop(0,   'rgba(200,130,70,0.10)');
      haze2.addColorStop(0.6, 'rgba(170,80,40,0.04)');
      haze2.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = haze2;
      ctx.fillRect(0, 0, W, H);

      /* City silhouette */
      ctx.fillStyle = '#04060f';
      buildings.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

      /* Window lights */
      buildings.forEach(b => {
        b.wins.forEach(w => {
          if (w.lit) {
            ctx.fillStyle = 'rgba(210,220,150,0.50)';
            ctx.fillRect(w.wx, w.wy, 4, 5);
          }
        });
      });

      /* Ground fog band */
      const fog = ctx.createLinearGradient(0, H * 0.58, 0, H * 0.80);
      fog.addColorStop(0,   'rgba(70,105,150,0.00)');
      fog.addColorStop(0.5, 'rgba(70,105,150,0.09)');
      fog.addColorStop(1,   'rgba(70,105,150,0.00)');
      ctx.fillStyle = fog;
      ctx.fillRect(0, H * 0.58, W, H * 0.22);

      /* Bottom shadow */
      const btm = ctx.createLinearGradient(0, H * 0.78, 0, H);
      btm.addColorStop(0, 'rgba(0,0,0,0)');
      btm.addColorStop(1, 'rgba(0,0,0,0.75)');
      ctx.fillStyle = btm;
      ctx.fillRect(0, H * 0.78, W, H * 0.22);

      /* ── Particles ── */
      particles.forEach(p => {
        p.x += p.sx;
        p.y += p.sy;
        if (p.x > W + 24) { p.x = -24; p.y = Math.random() * H * 0.72; }
        if (p.y < -24)      { p.y = H * 0.70; }
        if (p.y > H * 0.72){ p.y = Math.random() * H * 0.4; }

        ctx.save();
        ctx.globalAlpha = p.op;
        if (p.bird) {
          /* Simple gull silhouette — two arcs forming an "M" */
          ctx.strokeStyle = 'rgba(170,210,245,0.90)';
          ctx.lineWidth   = 0.85;
          ctx.beginPath();
          const s = p.sz;
          ctx.moveTo(p.x - s,       p.y);
          ctx.quadraticCurveTo(p.x - s * 0.5, p.y - s * 0.95, p.x,        p.y - s * 0.18);
          ctx.quadraticCurveTo(p.x + s * 0.5, p.y - s * 0.95, p.x + s,    p.y);
          ctx.stroke();
        } else {
          ctx.fillStyle = 'rgba(170,210,245,0.75)';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.sz * 0.35, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
    }

    /* ── Animation loop ── */
    function loop() {
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
      resize();
      initParticles();
    });

    resize();
    initParticles();
    loop();
  </script>

  <script>
    /* ─── Ambient music (Web Audio API) ─────────────────────────────
       Dark atmospheric soundscape matching the night-city canvas.
       Starts only on user interaction to satisfy browser autoplay policy.
    ─────────────────────────────────────────────────────────────── */
    (function () {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;

      let ctx, master;
      let droneNodes = [];
      let arpTimer   = null;
      let playing    = false;

      const btn = document.getElementById('music-btn');

      function buildAmbient() {
        ctx    = new Ctx();
        master = ctx.createGain();
        master.gain.value = 0;
        master.connect(ctx.destination);

        /* — feedback-delay reverb — */
        const delay   = ctx.createDelay(3.0);
        const fbGain  = ctx.createGain();
        const wetGain = ctx.createGain();
        delay.delayTime.value = 0.55;
        fbGain.gain.value     = 0.48;
        wetGain.gain.value    = 0.32;
        delay.connect(fbGain);
        fbGain.connect(delay);
        delay.connect(wetGain);
        wetGain.connect(master);

        /* — drone oscillators (A-minor tonality) — */
        const drones = [
          { freq: 55.00,  type: 'sine',     vol: 0.14 }, /* A1 */
          { freq: 82.41,  type: 'sine',     vol: 0.09 }, /* E2 */
          { freq: 110.00, type: 'sine',     vol: 0.07 }, /* A2 */
          { freq: 130.81, type: 'triangle', vol: 0.04 }, /* C3 */
        ];
        drones.forEach(function (d, i) {
          const osc = ctx.createOscillator();
          const g   = ctx.createGain();
          osc.type            = d.type;
          osc.frequency.value = d.freq;
          osc.detune.value    = (i % 2 === 0 ? 4 : -4);
          g.gain.value        = d.vol;
          osc.connect(g);
          g.connect(master);
          g.connect(delay);
          osc.start();

          /* micro-drift LFO */
          const lfo = ctx.createOscillator();
          const lg  = ctx.createGain();
          lfo.frequency.value = 0.03 + i * 0.019;
          lg.gain.value       = 1.2;
          lfo.connect(lg);
          lg.connect(osc.detune);
          lfo.start();

          droneNodes.push(osc, lfo);
        });

        /* — slow arpeggio: Am9 tones (A3 C4 E4 G4 B4) — */
        const arpScale = [220, 261.63, 329.63, 392.00, 493.88, 392.00, 329.63, 261.63];
        let arpIdx   = 0;

        function fireArp() {
          if (!playing) return;
          const freq = arpScale[arpIdx++ % arpScale.length];

          const osc = ctx.createOscillator();
          const env = ctx.createGain();
          osc.type            = 'triangle';
          osc.frequency.value = freq;
          env.gain.setValueAtTime(0,      ctx.currentTime);
          env.gain.linearRampToValueAtTime(0.045, ctx.currentTime + 0.18);
          env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.4);
          osc.connect(env);
          env.connect(master);
          env.connect(delay);
          osc.start();
          osc.stop(ctx.currentTime + 2.5);

          arpTimer = setTimeout(fireArp, 1800 + Math.random() * 1600);
        }

        arpTimer = setTimeout(fireArp, 600);
      }

      function startMusic() {
        playing = true;
        if (!ctx) buildAmbient();
        else if (ctx.state === 'suspended') ctx.resume();
        master.gain.cancelScheduledValues(ctx.currentTime);
        master.gain.linearRampToValueAtTime(0.30, ctx.currentTime + 1.8);
        btn.textContent = '🔊';
      }

      function stopMusic() {
        playing = false;
        clearTimeout(arpTimer);
        arpTimer = null;
        if (ctx && master) {
          master.gain.cancelScheduledValues(ctx.currentTime);
          master.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5);
          /* close context and release drone oscillators after fade */
          const ctxToClose   = ctx;
          const nodesToStop  = droneNodes.slice();
          setTimeout(function () {
            if (!playing) {
              nodesToStop.forEach(function (n) { try { n.stop(); } catch (e) {} });
              ctxToClose.close();
            }
          }, 1600);
          ctx        = null;
          master     = null;
          droneNodes = [];
        }
        btn.textContent = '🔇';
      }

      btn.addEventListener('click', function () {
        if (playing) stopMusic(); else startMusic();
      });

      /* ── Auto-start immediately; resume on first interaction if browser blocks ── */
      startMusic();
      function autoResume(e) {
        if (e && e.target === btn) return;
        if (ctx) ctx.resume();
        document.removeEventListener('click',      autoResume);
        document.removeEventListener('keydown',    autoResume);
        document.removeEventListener('touchstart', autoResume);
      }
      document.addEventListener('click',      autoResume);
      document.addEventListener('keydown',    autoResume);
      document.addEventListener('touchstart', autoResume);
    })();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan 110: Introduction to Japanese Popular Culture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* ── Canvas background ───────────────────────────────────────── */
    #bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── CRT scanlines ───────────────────────────────────────────── */
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.20) 2px,
        rgba(0, 0, 0, 0.20) 4px
      );
    }

    /* ── CRT vignette ────────────────────────────────────────────── */
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 52%,
        rgba(0, 0, 0, 0.80) 100%
      );
    }

    /* ── UI overlay ─────────────────────────────────────────────── */
    .ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 5;
    }

    /* ── Score bar ───────────────────────────────────────────────── */
    .score-bar {
      width: 100%;
      padding: 10px 5% 8px;
      display: flex;
      justify-content: space-around;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.38rem, 1.0vw, 0.65rem);
      line-height: 1.8;
      text-align: center;
    }

    .score-label { color: #FF4444; }
    .score-value { color: #ffffff; }

    /* ── Title block ─────────────────────────────────────────────── */
    .title-block {
      margin-top: clamp(4px, 0.8vh, 10px);
      text-align: center;
      padding: 0 4%;
    }

    .main-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.8rem, 6.5vw, 5rem);
      color: #FF1A1A;
      text-transform: uppercase;
      line-height: 1.15;
      /* Thick yellow outline + dark red drop shadow — classic DK logo look */
      text-shadow:
        3px  0   0 #FFE000,
       -3px  0   0 #FFE000,
        0    3px 0 #FFE000,
        0   -3px 0 #FFE000,
        3px  3px 0 #FFE000,
       -3px -3px 0 #FFE000,
        3px -3px 0 #FFE000,
       -3px  3px 0 #FFE000,
        6px  6px 0 #7A0000;
    }

    .sub-title {
      margin-top: clamp(6px, 1.2vh, 12px);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.38rem, 1.05vw, 0.72rem);
      color: #FFE000;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 2.0;
      text-shadow: 2px 2px 0 #7A6000;
    }

    /* ── Start button ────────────────────────────────────────────── */
    .menu {
      margin-top: auto;
      margin-bottom: clamp(60px, 14vh, 130px);
    }

    .start-btn {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.65rem, 1.7vw, 1.05rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ffffff;
      text-decoration: none;
      padding: 10px 26px;
      border: 3px solid #ffffff;
      background: transparent;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.70);
      animation: blink-btn 1.1s step-end infinite;
    }

    @keyframes blink-btn {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .start-btn:hover,
    .start-btn:focus {
      color: #000000;
      background: #ffffff;
      text-shadow: none;
      animation: none;
      outline: none;
    }

    /* ── Professor / copyright ───────────────────────────────────── */
    .professor {
      position: absolute;
      bottom: 16px;
      width: 100%;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.30rem, 0.75vw, 0.52rem);
      color: #4488FF;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      z-index: 5;
    }

    /* ── Music toggle (DK arcade style) ─────────────────────────── */
    #music-btn {
      position: fixed;
      bottom: 16px;
      right: 5%;
      background: #c80000;
      border: 3px solid #ffcc00;
      color: #ffcc00;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      padding: 6px 10px;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s, box-shadow 0.2s;
      z-index: 20;
      box-shadow: 3px 3px 0 #000, 0 0 8px rgba(255, 68, 0, 0.70);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.5;
    }
    #music-btn:hover {
      opacity: 1;
      box-shadow: 3px 3px 0 #000, 0 0 14px rgba(255, 200, 0, 0.90);
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="ui">

    <div class="score-bar">
      <div>
        <div class="score-label">1UP</div>
        <div class="score-value">000000</div>
      </div>
      <div>
        <div class="score-label">HIGH SCORE</div>
        <div class="score-value">000000</div>
      </div>
      <div>
        <div class="score-label">2UP</div>
        <div class="score-value">000000</div>
      </div>
    </div>

    <div class="title-block">
      <div class="main-title">Japan 110</div>
      <div class="sub-title">Introduction to<br>Japanese Popular Culture</div>
    </div>

    <div class="menu">
      <a href="https://prof-quinn-japan110-popculture.replit.app/tutorial" class="start-btn">&#9658; Start &#9668;</a>
    </div>

  </div>

  <div class="professor">&#169; Professor Aragorn Quinn</div>
  <button id="music-btn" title="Toggle music">♪ ON</button>

  <script>
    /* ─────────────────────────────────────────────────────────────
       Canvas: Donkey Kong-style construction site
       Tilted steel-blue girder platforms, yellow ladders, rivets,
       and brown barrels that roll down the slopes.
    ───────────────────────────────────────────────────────────── */
    const canvas = document.getElementById('bg');
    const ctx    = canvas.getContext('2d');

    const DEFAULT_WIDTH  = 800;
    const DEFAULT_HEIGHT = 500;

    let W, H;
    let platforms = [];
    let barrels   = [];

    /* ── Resize ── */
    function resize() {
      W = canvas.width  = window.innerWidth  || DEFAULT_WIDTH;
      H = canvas.height = window.innerHeight || DEFAULT_HEIGHT;
      buildScene();
    }

    /* ── Build platforms and ladders ── */
    function buildScene() {
      platforms = [];
      const NUM = 5;
      /* Platforms spaced vertically; tilt alternates left-down / right-down */
      for (let i = 0; i < NUM; i++) {
        const frac  = 0.82 - i * 0.125;          /* vertical fraction from top */
        const yMid  = H * frac;
        const tilt  = (i % 2 === 0) ? 0.045 : -0.045;  /* slope as dy/dx fraction */
        const ph    = Math.max(9, H * 0.025);    /* girder thickness */
        /* yAt(x) = yMid + (x - W/2) * tilt */
        platforms.push({ yMid, tilt, ph });
      }

      /* Reset barrels spread across platforms */
      barrels = [];
      for (let i = 0; i < 5; i++) {
        spawnBarrel(i % platforms.length, Math.random());
      }
    }

    function platY(p, x) {
      return p.yMid + (x - W * 0.5) * p.tilt;
    }

    function spawnBarrel(pIdx, xFrac) {
      const p   = platforms[pIdx];
      /* Roll toward the lower end of the slope */
      const dir = p.tilt >= 0 ? 1 : -1;
      barrels.push({
        x:       xFrac * W,
        pIdx,
        dir,
        speed:   1.0 + Math.random() * 1.2,
        angle:   Math.random() * Math.PI * 2
      });
    }

    /* ── Draw platforms ── */
    function drawPlatforms() {
      platforms.forEach(p => {
        const yL = platY(p, 0);
        const yR = platY(p, W);

        /* Girder face */
        ctx.beginPath();
        ctx.moveTo(0,  yL);
        ctx.lineTo(W,  yR);
        ctx.lineTo(W,  yR + p.ph);
        ctx.lineTo(0,  yL + p.ph);
        ctx.closePath();

        const grd = ctx.createLinearGradient(0, yL, 0, yL + p.ph * 2.5);
        grd.addColorStop(0,   '#6688EE');
        grd.addColorStop(0.5, '#2244BB');
        grd.addColorStop(1,   '#0A1A88');
        ctx.fillStyle = grd;
        ctx.fill();

        /* Rivet dots */
        ctx.fillStyle = '#FF8800';
        const spacing = Math.max(28, W * 0.038);
        for (let rx = spacing / 2; rx < W; rx += spacing) {
          const ry = platY(p, rx) + p.ph * 0.5;
          ctx.beginPath();
          ctx.arc(rx, ry, Math.max(2.5, W * 0.004), 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    /* ── Draw ladders ── */
    function drawLadders() {
      const lw = Math.max(12, W * 0.018);
      platforms.forEach((p, i) => {
        if (i >= platforms.length - 1) return;
        /* Place ladder on the low end of each platform */
        const lx   = p.tilt >= 0 ? W * 0.78 : W * 0.22;
        const pNext = platforms[i + 1];
        const yTop = platY(p, lx) + p.ph;
        const yBot = platY(pNext, lx);

        /* Sides */
        ctx.strokeStyle = '#FFCC00';
        ctx.lineWidth   = 2.5;
        [lx - lw / 2, lx + lw / 2].forEach(sx => {
          ctx.beginPath();
          ctx.moveTo(sx, yTop);
          ctx.lineTo(sx, yBot);
          ctx.stroke();
        });

        /* Rungs */
        ctx.lineWidth = 2;
        const rungGap = Math.max(8, H * 0.015);
        for (let ry = yTop + 5; ry < yBot - 3; ry += rungGap) {
          ctx.beginPath();
          ctx.moveTo(lx - lw / 2, ry);
          ctx.lineTo(lx + lw / 2, ry);
          ctx.stroke();
        }
      });
    }

    /* ── Draw & animate barrels ── */
    function drawBarrels() {
      const bR = Math.max(11, W * 0.016);

      barrels.forEach(b => {
        const p  = platforms[b.pIdx];
        const by = platY(p, b.x) - bR * 0.9;

        /* Draw barrel */
        ctx.save();
        ctx.translate(b.x, by);
        ctx.rotate(b.angle);

        /* Body */
        ctx.fillStyle = '#774400';
        ctx.beginPath();
        ctx.ellipse(0, 0, bR, bR * 0.88, 0, 0, Math.PI * 2);
        ctx.fill();

        /* Bands */
        ctx.strokeStyle = '#FFB800';
        ctx.lineWidth   = Math.max(1.5, bR * 0.18);
        /* Horizontal band */
        ctx.beginPath();
        ctx.ellipse(0, 0, bR * 0.68, bR * 0.60, 0, 0, Math.PI * 2);
        ctx.stroke();
        /* Vertical divider */
        ctx.beginPath();
        ctx.moveTo(0, -bR * 0.88);
        ctx.lineTo(0,  bR * 0.88);
        ctx.stroke();

        ctx.restore();

        /* Roll */
        b.angle += b.dir * 0.07;
        b.x     += b.dir * b.speed;

        /* Reached edge of platform → drop to next platform or wrap */
        const offLeft  = b.x < -bR * 3;
        const offRight = b.x >  W + bR * 3;
        if (offLeft || offRight) {
          const nextPIdx = (b.pIdx + 1) % platforms.length;
          b.pIdx = nextPIdx;
          const np = platforms[nextPIdx];
          b.dir   = np.tilt >= 0 ? 1 : -1;
          b.x     = b.dir === 1 ? -bR * 2 : W + bR * 2;
          b.speed = 1.0 + Math.random() * 1.2;
        }
      });
    }

    /* ── Main draw ── */
    function draw() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, W, H);

      drawPlatforms();
      drawLadders();
      drawBarrels();
    }

    function loop() {
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    resize();
    loop();
  </script>

  <script>
    /* ─── 8-bit arcade music (Web Audio API) ─────────────────────────
       DK-inspired square-wave melody + triangle bass.
       Starts only on user interaction to satisfy browser autoplay policy.
    ─────────────────────────────────────────────────────────────── */
    (function () {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;

      let ctx, master;
      let loopTimer = null;
      let playing   = false;

      const btn = document.getElementById('music-btn');

      /* — Note frequency table — */
      const N = {
        C3:130.81, D3:146.83, E3:164.81, G3:196.00, A3:220.00,
        C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00,
        A4:440.00, B4:493.88,
        C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99,
        R: 0
      };

      const BPM        = 144;
      const eighthNote = 60 / BPM / 2; /* 8th-note duration (seconds) */

      /* — Melody: [freq, 8th-note-count] (64 beats total) — */
      const MELODY = [
        [N.G4,1],[N.G4,1],[N.A4,1],[N.B4,1],[N.G4,1],[N.E4,1],[N.D4,2],
        [N.G4,1],[N.A4,1],[N.B4,1],[N.C5,1],[N.D5,2],[N.R,2],
        [N.E5,1],[N.D5,1],[N.C5,1],[N.B4,1],[N.A4,1],[N.G4,2],[N.R,1],
        [N.G4,1],[N.A4,1],[N.B4,1],[N.C5,1],[N.B4,1],[N.A4,1],[N.G4,2],
        [N.G4,1],[N.G4,1],[N.A4,1],[N.B4,1],[N.G4,1],[N.E4,1],[N.D4,2],
        [N.G5,1],[N.F5,1],[N.E5,1],[N.D5,1],[N.C5,2],[N.R,2],
        [N.A4,1],[N.B4,1],[N.C5,1],[N.D5,1],[N.E5,1],[N.D5,1],[N.C5,1],[N.B4,1],
        [N.G4,2],[N.R,1],[N.A4,1],[N.G4,2],[N.R,2],
      ];

      /* — Bass line: [freq, 8th-note-count] (64 beats total) — */
      const BASS = [
        [N.G3,4],[N.C4,4],
        [N.E3,4],[N.D3,4],
        [N.G3,4],[N.C4,4],
        [N.D3,4],[N.G3,4],
        [N.G3,4],[N.C4,4],
        [N.A3,4],[N.D3,4],
        [N.G3,4],[N.E3,4],
        [N.D3,4],[N.G3,4],
      ];

      function buildCtx() {
        ctx    = new Ctx();
        master = ctx.createGain();
        master.gain.value = 0;
        master.connect(ctx.destination);
      }

      function schedNote(freq, durSec, startTime, vol, type) {
        if (freq === N.R) return;
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.type            = type;
        osc.frequency.value = freq;
        const sustain = durSec * 0.72;
        const release = durSec * 0.22;
        env.gain.setValueAtTime(0,   startTime);
        env.gain.linearRampToValueAtTime(vol,      startTime + 0.008);
        env.gain.setValueAtTime(vol * 0.85,        startTime + sustain);
        env.gain.linearRampToValueAtTime(0,        startTime + sustain + release);
        osc.connect(env);
        env.connect(master);
        osc.start(startTime);
        osc.stop(startTime + sustain + release + 0.01);
      }

      function scheduleLoop() {
        if (!playing) return;
        const start = ctx.currentTime + 0.05;
        let tM = start, tB = start;

        MELODY.forEach(function (entry) {
          schedNote(entry[0], entry[1] * eighthNote, tM, 0.22, 'square');
          tM += entry[1] * eighthNote;
        });
        BASS.forEach(function (entry) {
          schedNote(entry[0], entry[1] * eighthNote, tB, 0.13, 'triangle');
          tB += entry[1] * eighthNote;
        });

        const loopLen = tM - start;
        loopTimer = setTimeout(scheduleLoop, (loopLen - 0.1) * 1000);
      }

      function startMusic() {
        playing = true;
        if (!ctx) buildCtx();
        else if (ctx.state === 'suspended') ctx.resume();
        master.gain.cancelScheduledValues(ctx.currentTime);
        master.gain.linearRampToValueAtTime(0.40, ctx.currentTime + 0.3);
        scheduleLoop();
        btn.textContent = '♪ ON';
      }

      function stopMusic() {
        playing = false;
        clearTimeout(loopTimer);
        loopTimer = null;
        if (ctx && master) {
          master.gain.cancelScheduledValues(ctx.currentTime);
          master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
          const ctxToClose = ctx;
          setTimeout(function () { if (!playing) ctxToClose.close(); }, 600);
          ctx    = null;
          master = null;
        }
        btn.textContent = '♪ OFF';
      }

      btn.addEventListener('click', function () {
        if (playing) stopMusic(); else startMusic();
      });

      /* ── Auto-start immediately; resume on first interaction if browser blocks ── */
      startMusic();
      function autoResume(e) {
        if (e && e.target === btn) return;
        if (ctx) ctx.resume();
        document.removeEventListener('click',      autoResume);
        document.removeEventListener('keydown',    autoResume);
        document.removeEventListener('touchstart', autoResume);
      }
      document.addEventListener('click',      autoResume);
      document.addEventListener('keydown',    autoResume);
      document.addEventListener('touchstart', autoResume);
    })();
  </script>

</body>
</html>
